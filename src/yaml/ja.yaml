                  - RHEL / CentOS を iPXE で起動できない問題に直面したが、新たに pxelinux を検証して導入することでサービスとして予定通りのリリースを達成
                  - 構築チームと協力して手順の見直しや工程の整理を行い、リージョン構築やグループ増設にかかる工期の短縮に貢献
