summary:
  description: |
    NTT ドコモビジネスにてパブリッククラウドサービスの開発に従事しています。
  details:
    - - クラウドサービスの開発チームのエンジニアリングマネージャー / チームリーダーを務めています。
      - - 幹部も含めた議論の主導や将来性 / 拡張性を考慮した方針 / 設計の判断、スケジュールの管理やタスクの細分化を通じて、チームの意思決定や問題解決を牽引しています。
        - 企画チームや保守チームと協力してサービスの仕様を決定し、関連するマイクロサービスチームや SRE チームなどと連携することで、サービスの価値や品質の向上を実現しています。
    - - ソフトウェアエンジニアとして長年クラウドサービスのバックエンド開発に携わることで、技術的な経験や知識を培ってきました。
      - - ネットワークやサーバーを as a Service として提供するための REST API や、それらをインフラストラクチャー上に構築し設定するための非同期処理、ユーザー向けのメトリクスを収集するための監視などを設計 / 実装してきました。
        - バックエンドのアーキテクチャを設計して CI / CD を整備したり、基盤をオンプレミス上の仮想サーバーからクラウドサービス上の Kubernetes に移行させたりした経験があります。
